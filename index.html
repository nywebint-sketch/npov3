<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>НПО Мелодия</title>
  <meta name="description" content="НПО Мелодия — клуб / лейбл / трансляции. Афиша, артисты, релизы, подкасты, live, мерч, контакты." />
  <link rel="stylesheet" href="NPO V3/styles.css" />
</head>
<body class="hero-fullscreen">
  <!-- Вся разметка такая же, как в NPO V3/index.html, но с путями к ассетам из подпапки -->
  <header class="topbar">
    <div class="container">
      <div class="in">
        <div class="brand">
          <button class="brand-mark menu-toggle" id="mobileMenuToggle" type="button" aria-label="Открыть меню" aria-expanded="false">
            <img src="NPO V3/smile.png" alt="Логотип НПО Мелодия" />
          </button>
        </div>

        <nav class="nav" aria-label="Навигация">
          <a href="#events">Афиша</a>
          <a href="#artists">Артисты</a>
          <a href="#releases">Релизы</a>
          <a href="#merch">Мерч</a>
          <a href="#profile">Профиль</a>
          <a href="#contacts">Контакты</a>
        </nav>

        <div class="right">
          <a class="btn sc-btn" href="https://soundcloud.com/npo_radio?utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing" target="_blank" rel="noopener noreferrer" aria-label="SoundCloud">
            <svg class="sc-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3.56 11.97a.8.8 0 0 0-.8.8v4.46a.8.8 0 1 0 1.6 0v-4.46a.8.8 0 0 0-.8-.8Zm2.52-1.37a.8.8 0 0 0-.8.8v5.83a.8.8 0 0 0 1.6 0V11.4a.8.8 0 0 0-.8-.8Zm2.52-.82a.8.8 0 0 0-.8.8v6.65a.8.8 0 1 0 1.6 0v-6.65a.8.8 0 0 0-.8-.8Zm2.52.44a.8.8 0 0 0-.8.8v6.21a.8.8 0 1 0 1.6 0v-6.21a.8.8 0 0 0-.8-.8Zm2.52 1.25a.8.8 0 0 0-.8.8v4.96a.8.8 0 0 0 1.6 0v-4.96a.8.8 0 0 0-.8-.8Zm1.91 6.56h4.11a2.94 2.94 0 1 0-.34-5.86 4.88 4.88 0 0 0-9.53-.76.8.8 0 0 0 1.49.58 3.28 3.28 0 0 1 6.36.84v.18a.8.8 0 0 0 .96.78c.18-.03.35-.05.52-.05a1.34 1.34 0 1 1 0 2.68h-4.11a.8.8 0 1 0 0 1.6Z" />
            </svg>
          </a>
          <a class="btn primary" href="#streams">Live</a>
        </div>
      </div>
    </div>
  </header>

  <div class="mobile-menu-backdrop" id="mobileMenuBackdrop" hidden></div>
  <nav class="mobile-menu" id="mobileMenu" aria-label="Мобильная навигация" hidden>
    <a href="#events">Афиша</a>
    <a href="#artists">Артисты</a>
    <a href="#releases">Релизы</a>
    <a href="#merch">Мерч</a>
    <a href="#profile">Профиль</a>
    <a href="#contacts">Контакты</a>
  </nav>

  <main>
    <!-- INTRO -->
    <section class="intro-start" id="home">
      <img class="intro-start-image" src="NPO V3/npo_print_source.png" alt="Изображение" />
    </section>

    <!-- Остальная разметка (секции events/artists/releases/merch/profile/contacts) такая же,
         скрипт сам заполняет данные из Supabase -->
    <section id="events">
      <div class="container">
        <div class="head">
          <div>
            <h2>Афиша</h2>
          </div>
        </div>
        <div class="grid g4" id="eventsGrid"></div>
      </div>
    </section>

    <section id="artists">
      <div class="container">
        <div class="head">
          <div><h2>Артисты</h2></div>
          <div class="row">
            <input type="search" class="input artist-search" id="artistSearch" placeholder="Поиск артиста..." aria-label="Поиск по артистам" />
          </div>
        </div>
        <div class="card">
          <div class="pad">
            <div class="grid g4" id="artistsGrid"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="releases">
      <div class="container">
        <div class="head">
          <div><h2>Релизы</h2></div>
        </div>
        <div class="card">
          <div class="pad">
            <div class="grid g4" id="releasesGrid"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="streams">
      <div class="container">
        <div class="head">
          <div><h2>Трансляции</h2></div>
          <div class="row">
            <span class="pill" id="streamNext">Следующий эфир: Warehouse Night · 07.03.2026 23:00</span>
          </div>
        </div>
        <div class="grid g2">
          <div class="card">
            <div class="pad">
              <div class="row sp">
                <b>Live</b>
                <span class="tag">placeholder</span>
              </div>
            </div>
            <div class="divider" style="margin:0;"></div>
            <div class="pad">
              <div class="media wide"><img src="NPO V3/smile.png" alt="" /></div>
            </div>
          </div>
          <div class="card pad">
            <div class="row sp">
              <b>Архив</b>
              <span class="tag">3 записи</span>
            </div>
            <div class="divider"></div>
            <div class="grid" id="streamsList"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="merch">
      <div class="container">
        <div class="head">
          <div><h2>Мерч</h2></div>
          <div class="row">
            <span class="pill">оплата: позже</span>
          </div>
        </div>
        <div class="grid g4" id="merchGrid"></div>
      </div>
    </section>

    <!-- PROFILE, CONTACTS, footer и модалка можно оставить как в NPO V3/index.html,
         они не зависят от путей к ассетам -->
  </main>

  <!-- Модалка и футер опущены для краткости, но могут быть скопированы 1:1 при необходимости -->

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script type="module" src="NPO V3/db.js"></script>
  <script src="NPO V3/script.js" defer></script>
</body>
</html>
